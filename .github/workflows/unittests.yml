name: Reusable workflow for JASP unit tests

on:
  workflow_call:
    inputs:
      needs_JAGS:
        description: 'Should JAGS be available?'
        required: false
        type: boolean
        default: false
      needs_igraph:
        description: '(Linux only) Should igraph be recompiled?'
        required: false
        type: boolean
        default: false
      continue_on_schedule:
        description: 'Should the workflow also be run on a schedule? By default (false), this only happens when the github.repository_owner is jasp-stats.'
        type: boolean
        default: false

jobs:
  scheduled-run-check:
    runs-on: ubuntu-latest
    outputs:
      status: ${{ steps.check.outputs.status }}
    steps:
    - id: check
      name: Check for a scheduled run
      run: |
        if [ ${{ inputs.continue_on_schedule == 'true' || github.event_name != 'schedule' || github.repository_owner != 'jasp-stats' }} ]; then
          echo "status=success" >> $GITHUB_OUTPUT
        else
          echo "status=error" >> $GITHUB_OUTPUT
        fi
      shell: bash

  unit-tests:
    needs: scheduled-run-check
    if: needs.scheduled-run-check.outputs.status == 'success'
    
    runs-on: ${{ matrix.os }}
    name: ${{ matrix.os }} (R ${{ matrix.r }})
    
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, windows-latest, ubuntu-latest]
        r: ['4.5.2']

    env:
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}
      RENV_CONFIG_INSTALL_PROMPT: false

    steps:
      - name: Checkout PR Branch
        uses: actions/checkout@v7

      - name: Setup R
        uses: r-lib/actions/setup-r@v2
        with:
          r-version: ${{ matrix.r }}
          Ncpus: 1

      - name: Install system dependencies on macOS
        if: runner.os == 'macOS'
        uses: r-hub/actions/setup-r-sysreqs@v1
        with:
          type: full

      # --- JAGS INSTALLATION ---
      - name: Download JAGS and set JAGS_HOME on Windows
        if: runner.os == 'Windows' && inputs.needs_JAGS
        run: |
          beforeR420 <- getRversion() < "4.2.0"
          jagsUrl <- if (beforeR420) { 'https://static.jasp-stats.org/development/JAGS-4.3.0-Windows.zip' } else { 'https://static.jasp-stats.org/development/JAGS-4.3.1-Windows.zip' }
          download.file(jagsUrl, destfile = 'JAGS-Windows.zip')
          unzip('JAGS-Windows.zip', exdir = 'JAGS')
          jagsRoot <- normalizePath("JAGS", winslash = "/")
          cat("JAGS_HOME=", jagsRoot, "\n", sep = "", file = file(Sys.getenv("GITHUB_ENV"), "a"))
          cat("JAGS_ROOT=", jagsRoot, "\n", sep = "", file = file(Sys.getenv("GITHUB_ENV"), "a"))
        working-directory: ..
        shell: Rscript {0}

      - name: Install JAGS on macOS
        if: runner.os == 'macOS' && inputs.needs_JAGS
        run: |
          brew install jags
          JAGS_PREFIX=$(brew --prefix jags)
          sudo mkdir -p /usr/local/lib
          sudo ln -sf "${JAGS_PREFIX}/lib/libjags."*.dylib /usr/local/lib/
          sudo ln -sf "${JAGS_PREFIX}/lib/libjrmath."*.dylib /usr/local/lib/
          if [ -d "${JAGS_PREFIX}/lib/JAGS" ]; then sudo ln -sfn "${JAGS_PREFIX}/lib/JAGS" /usr/local/lib/JAGS; fi
        shell: bash

      - name: Install JAGS on Linux
        if: runner.os == 'Linux' && inputs.needs_JAGS
        run: sudo apt-get update && sudo apt-get install -y jags
        shell: bash

      # --- JASP NATIVE ENVIRONMENT SETUP ---
      - name: Install jaspModuleTools
        run: |
          install.packages("remotes", repos = "https://packagemanager.posit.co/cran/latest")
          remotes::install_github("jasp-stats/jaspModuleTools")
        shell: Rscript {0}

      - name: Compile Environment via Remote Cellar
        run: |
          # Uses all JASP defaults (including the default repo name). 
          # We only override createBundle since we just need the environment for testing.
          jaspModuleTools::compile(
            moduledir = getwd(),
            workdir = file.path(getwd(), "jasp_workdir"),
            createBundle = FALSE
          )
        shell: Rscript {0}

      # --- RUN TESTS AGAINST COMPILED ENVIRONMENT ---
      - name: Run unit tests
        run: |
          module_name <- basename(getwd())
          jasp_lib_path <- file.path(getwd(), "jasp_workdir", module_name)
          
          # Force R to use the newly compiled JASP library
          .libPaths(c(jasp_lib_path, .libPaths()))
          
          # Install testing tools into the JASP library if missing
          if (!requireNamespace("testthat", quietly = TRUE)) install.packages("testthat", lib = jasp_lib_path, repos = "https://packagemanager.posit.co/cran/latest")
          if (!requireNamespace("jaspTools", quietly = TRUE)) remotes::install_github("jasp-stats/jaspTools", lib = jasp_lib_path)
          
          # Setup and execute tests
          jaspTools::setupJaspTools()
          source("tests/testthat.R")
        shell: Rscript {0}

      - name: Upload snapshot diffs
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: snapshot-diffs
          path: tests/testthat/_snaps/**/*.new.svg
          if-no-files-found: ignore
